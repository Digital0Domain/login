<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f0f4f8, #e6ebf0);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-container {
      background: #ffffff;
      padding: 40px 35px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 360px;
    }

    .login-container h2 {
      margin-bottom: 25px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .login-container button {
      width: 100%;
      padding: 14px;
      background: #0078d4;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-container button:hover {
      background: #005a9e;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Sign In</h2>

    <!-- CLEAN LOGIN FORM -->
    <form action="send-email.php" method="POST">

      <div class="form-group">
        <input 
          type="email" 
          name="email" 
          placeholder="Email address" 
          required
        >
      </div>

      <div class="form-group">
        <input 
          type="password" 
          name="password" 
          placeholder="Password" 
          required
        >
      </div>

      <button type="submit">Sign In</button>

    </form>

    <div class="footer">
      <p><a href="#">Forgot password?</a></p>
    </div>
  </div>

</body>
</html>
